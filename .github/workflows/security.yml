name: Security

on:
  schedule:
    - cron: '17 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            server/package-lock.json

      - name: Install web deps
        run: npm --prefix web ci

      - name: Install server deps
        run: npm --prefix server ci

      - name: npm audit (JSON, non-blocking)
        run: |
          npm --prefix web audit --json > npm-audit-web.json || true
          npm --prefix server audit --json > npm-audit-server.json || true

      - name: Upload npm audit reports
        uses: actions/upload-artifact@v6
        with:
          name: npm-audit
          path: |
            npm-audit-web.json
            npm-audit-server.json

  trivy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare Trivy cache
        run: mkdir -p "$HOME/.cache/trivy"

      - name: Trivy filesystem scan (SARIF)
        run: |
          docker run --rm \
            -v "$PWD":/src \
            -v "$HOME/.cache/trivy":/root/.cache/trivy \
            aquasec/trivy:0.57.1 fs /src \
            --format sarif \
            --output /src/trivy.sarif \
            --severity CRITICAL,HIGH \
            --ignore-unfixed

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif
